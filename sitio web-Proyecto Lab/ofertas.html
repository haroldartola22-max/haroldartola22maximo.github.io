<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecofresh - Ofertas Relámpago</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f3f3f3; transition: background-color 0.3s, color 0.3s; }
        
        /* --- ENCABEZADO UNIFICADO ESTILO IMAGEN --- */
        header { 
            background-color: #1a73e8; /* Azul vibrante de la imagen */
            color: white; 
            padding: 15px 20px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Fila Superior: Logo, Buscador y Carrito */
        .header-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .logo { 
            display: flex; 
            align-items: center; 
            font-size: 24px; 
            font-weight: bold; 
            text-decoration: none; 
            color: white;
            flex-shrink: 0;
        }
        .logo img { height: 45px; margin-right: 10px; border-radius: 4px; background: white; }
        
        .search-bar { 
            flex-grow: 1; 
            max-width: 600px;
            display: flex; 
        }
        .search-bar input { 
            width: 100%; 
            padding: 10px 15px; 
            border-radius: 4px 0 0 4px; 
            border: none; 
            outline: none;
            font-size: 14px;
        }
        .search-bar button { 
            padding: 0 20px; 
            background: #e1f5fe; 
            border: none; 
            border-radius: 0 4px 4px 0; 
            cursor: pointer; 
            color: #1a73e8;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carrito-btn { 
            background: #cddc39; /* Verde lima de la imagen */
            color: #333; 
            padding: 10px 15px; 
            border-radius: 6px; 
            font-weight: bold; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            white-space: nowrap;
        }

        /* Fila Inferior: Navegación */
        nav { 
            display: flex; 
            gap: 25px; 
        }
        nav a { 
            color: white; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 500;
            opacity: 0.9; 
            transition: 0.2s;
        }
        nav a:hover, nav a.active { opacity: 1; text-decoration: underline; }

        /* --- ESTILOS ORIGINALES DE OFERTAS CONSERVADOS --- */
        .banner-ofertas {
            background: linear-gradient(135deg, #0984f7, #54aadb);
            color: white;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
        }

        .contador-oferta {
            font-size: 18px;
            background: rgba(0,0,0,0.2);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            margin-top: 10px;
        }

        main { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .grid-ofertas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .tarjeta-oferta {
            background: white;
            border-radius: 12px;
            padding: 15px;
            position: relative;
            border: 2px solid #468fee;
            transition: 0.3s;
        }

        .tarjeta-oferta:hover { transform: scale(1.03); }

        .badge-descuento {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #d9e62e;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .img-sim { height: 120px; background: #fff5f5; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 10px; border-radius: 5px;}
        .img-logo { width: 100%; height: 100%; object-fit: contain; } /* Mantiene relación de aspecto */

        .nombre-p { font-weight: bold; font-size: 15px; margin-bottom: 10px; color: #333; display: block; }
        .precio-antes { color: #777; text-decoration: line-through; font-size: 14px; }
        .precio-ahora { color: #2b87da; font-size: 22px; font-weight: bold; display: block; margin: 5px 0; }

        .btn-oferta {
            background: #1a4a2e;
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-oferta:hover { background: #2d7a4d; }

        /* MODO OSCURO */
        body.dark-mode { background-color: #121212; color: #e0e0e0; }
        body.dark-mode header { background-color: #0d47a1; }
        body.dark-mode .banner-ofertas { background: linear-gradient(135deg, #0d47a1, #1565c0); }
        body.dark-mode .tarjeta-oferta { background-color: #1e1e1e; border-color: #333; }
        body.dark-mode .nombre-p { color: #88ccff; }
        body.dark-mode .img-sim { background-color: #2a2a2a; }
        body.dark-mode .precio-ahora { color: #64b5f6; }
        body.dark-mode .precio-antes { color: #aaa; }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <!-- Primera Fila -->
            <div class="header-top">
                <a href="index.html" class="logo">
                    <img src="logo.jpg" alt="Logo Ecofresh">
                    ECOFRESH
                </a>
                
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Buscar productos biodegradables...">
                    <button onclick="realizarBusqueda()">🔍</button>
                </div>

                <a href="carrito.html" class="carrito-btn">
                    🛒 Carrito: <span id="cart-count">0</span>
                </a>
            </div>

            <!-- Segunda Fila (Pestañas) -->
            <nav>
                <a href="index.html">Inicio</a>
                <a href="categoria.html">Categorías</a>
                <a href="ofertas.html" class="active" style="text-decoration: underline;">Ofertas</a>
                <a href="vendido.html">Lo más vendido</a>
                <a href="contacto.html">Contacto</a>
                <a href="ajustes.html">Ajustes</a>
                <a href="cuenta.html">Cuenta</a>
            </nav>
        </div>
    </header>

    <div class="banner-ofertas">
        <h1>⚡ OFERTAS RELÁMPAGO ⚡</h1>
        <p>Precios de liquidación en productos seleccionados.</p>
        <div class="contador-oferta">Termina en: <span id="timer">02:59:59</span></div>
    </div>

    <main>
        <div class="grid-ofertas" id="contenedor-ofertas">
            <!-- Los productos se inyectan por JS -->
        </div>
    </main>

    <script>
        const ofertas = [
            {n: 'Detergente lavatrastes biodegradable', antes: 35, ahora: 25, desc: '-28%'},
            {n: 'Cepillo de dientes de bambú', antes: 15, ahora: 9, desc: '-40%'},
            {n: 'Jabón corporal artesanal', antes: 25, ahora: 18, desc: '-28%'},
            {n: 'Limpia pisos de coco (Litro)', antes: 40, ahora: 30, desc: '-25%'},
            {n: 'Bicarbonato de sodio (1kg)', antes: 20, ahora: 15, desc: '-25%'},
            {n: 'Esponjas de fibra vegetal', antes: 15, ahora: 10, desc: '-33%'},
            {n: 'Champú sólido en pastilla', antes: 55, ahora: 45, desc: '-18%'},
            {n: 'Desinfectante natural cítrico', antes: 30, ahora: 22, desc: '-26%'}
        ];

        function cargarOfertas() {
            const container = document.getElementById('contenedor-ofertas');
            ofertas.forEach(o => {
                container.innerHTML += `
                    <div class="tarjeta-oferta">
                        <div class="badge-descuento">${o.desc}</div>
                        <div class="img-sim"><img src="${o.n}.jpg" alt="${o.n}" class="img-logo"></div>
                        <span class="nombre-p">${o.n}</span>
                        <span class="precio-antes">Q${o.antes}.00</span>
                        <span class="precio-ahora">Q${o.ahora}.00</span>
                        <button class="btn-oferta" onclick="agregar('${o.n}', ${o.ahora})">¡Lo quiero!</button>
                    </div>
                `;
            });
        }

        function agregar(nombre, precio) {
            let carrito = JSON.parse(localStorage.getItem('miCarrito')) || [];
            carrito.push({ nombre: nombre + " (OFERTA)", precio: precio });
            localStorage.setItem('miCarrito', JSON.stringify(carrito));
            actualizarContador();
            alert('¡Oferta aprovechada! Se agregó al carrito.');
        }

        function actualizarContador() {
            let carrito = JSON.parse(localStorage.getItem('miCarrito')) || [];
            document.getElementById('cart-count').textContent = carrito.length;
        }

        function realizarBusqueda() {
            let query = document.getElementById('searchInput').value.trim();
            if(query) { window.location.href = 'categoria.html?q=' + encodeURIComponent(query); }
        }

        function startTimer() {
            let duration = 3 * 60 * 60; 
            let timerDisplay = document.getElementById('timer');
            setInterval(() => {
                let h = parseInt(duration / 3600, 10);
                let m = parseInt((duration % 3600) / 60, 10);
                let s = parseInt(duration % 60, 10);
                timerDisplay.textContent = `${h < 10 ? "0"+h : h}:${m < 10 ? "0"+m : m}:${s < 10 ? "0"+s : s}`;
                if (--duration < 0) duration = 3 * 60 * 60;
            }, 1000);
        }

        function aplicarModoOscuro() {
            if(localStorage.getItem('darkMode') === 'enabled') { document.body.classList.add('dark-mode'); }
        }

        window.onload = () => {
            cargarOfertas();
            startTimer();
            actualizarContador();
            aplicarModoOscuro();
        };
    </script>
</body>
</html>
